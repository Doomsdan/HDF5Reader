[pytest]
testpaths =
    tests
pythonpath =
    hdf5_gui_py3
    .
addopts =
    -ra
    -p no:cacheprovider
markers =
    integration: tests that need local measurement data, HDF5 files, or external paths
    gui: tests that instantiate PyQt widgets
filterwarnings =
    ignore:The argument 'infer_datetime_format' is deprecated.*:UserWarning
    ignore:invalid escape sequence.*:SyntaxWarning
    ignore:.*with 'int' literal.*:SyntaxWarning
